name: Run API Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Collection
        run: |
          newman run collection.json -r cli,html --reporter-html-export report.html
          ls   

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: report.html